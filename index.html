<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSA Daily Mailer</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0b1220;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: #111827;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      button {
        background: linear-gradient(135deg, #6366f1, #9333ea);
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.15s ease;
      }
      button:active {
        transform: scale(0.97);
      }
      .status {
        margin-top: 18px;
        font-size: 14px;
        color: #cbd5e1;
      }
      a {
        color: #60a5fa;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>DSA Daily Mailer</h1>
      <p>Send today's problem email to all subscribers.</p>
      <button id="sendBtn">Send Email</button>
      <div class="status" id="status"></div>
      <p style="margin-top: 18px; font-size: 13px; color: #9ca3af;">Powered by your repo code - <a href="https://github.com/varun-gavoor212/dsa-scrapper" target="_blank">view on GitHub</a></p>
    </div>

    <script>
      const sendBtn = document.getElementById('sendBtn');
      const status = document.getElementById('status');

      sendBtn.addEventListener('click', async () => {
        status.textContent = 'Sending...';
        sendBtn.disabled = true;
        try {
          const res = await fetch('/api/send-daily', { method: 'POST' });
          const data = await res.json();
          status.textContent = data.ok ? '✅ Sent! Check inbox.' : `❌ ${data.error || 'Failed'}`;
        } catch (err) {
          status.textContent = '❌ Request failed.';
          console.error(err);
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
